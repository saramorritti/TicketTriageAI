# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy dotnet core app to Azure Function App - TicketTriageAI-Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './TicketTriageAI.Functions'
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ./TicketTriageAI.Functions/TicketTriageAI.Functions.csproj

      - name: Build
        run: dotnet build ./TicketTriageAI.Functions/TicketTriageAI.Functions.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./TicketTriageAI.Functions/TicketTriageAI.Functions.csproj --configuration Release --no-build --output ./output

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A084484865394F43ABA2E89FD0F2F613 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B41746A3903943B490870FDC9E7A3CC2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BAA886D575E64ADCA6DAE0110BF5DDA7 }}

      - name: Run Azure Functions Action
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'TicketTriageAI-Functions'
          slot-name: 'Production'
          package: './output'
